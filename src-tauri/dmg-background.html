<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>kVoice DMG Background</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 660px;
      height: 400px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 60px;
      position: relative;
      overflow: hidden;
    }

    /* Cosmic background elements */
    .stars {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.4), transparent),
        radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 230px 50px, rgba(255,255,255,0.3), transparent),
        radial-gradient(2px 2px at 300px 100px, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 400px 80px, rgba(255,255,255,0.4), transparent),
        radial-gradient(2px 2px at 500px 60px, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 600px 120px, rgba(255,255,255,0.3), transparent),
        radial-gradient(2px 2px at 550px 200px, rgba(255,255,255,0.2), transparent);
    }

    /* Nebula glow */
    .nebula {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
    }
    .nebula-1 {
      top: -100px;
      left: -50px;
      background: radial-gradient(circle, #ff6b35, transparent);
    }
    .nebula-2 {
      bottom: -100px;
      right: -50px;
      background: radial-gradient(circle, #4a90d9, transparent);
    }

    .instruction {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
      z-index: 10;
    }
    .arrow {
      font-size: 48px;
      margin: 0 40px;
      color: rgba(255, 107, 53, 0.8);
      z-index: 10;
    }
    .hint {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 12px;
      z-index: 10;
    }

    /* Placeholder boxes for app icon and Applications folder */
    .icons-row {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      z-index: 10;
    }
    .icon-placeholder {
      width: 100px;
      height: 100px;
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>

  <div class="icons-row">
    <div class="icon-placeholder">kVoice.app</div>
    <div class="arrow">→</div>
    <div class="icon-placeholder">Applications</div>
  </div>

  <p class="instruction">Drag kVoice to Applications to install</p>
  <p class="hint">Then launch from Applications or Spotlight</p>
</body>
</html>
