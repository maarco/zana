<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="bgRadial" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="60%" stop-color="#0d0b1a"/>
      <stop offset="100%" stop-color="#060409"/>
    </radialGradient>

    <!-- Ambient glow behind logo -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#EF4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Red accent gradient for the voice streaks -->
    <linearGradient id="streakGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3131"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow on red streaks -->
    <filter id="streakGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgRadial)"/>

  <!-- Star field -->
  <g opacity="0.5">
    <circle cx="142" cy="188" r="2" fill="#E8D5B7"/>
    <circle cx="878" cy="162" r="2.5" fill="#E8D5B7"/>
    <circle cx="195" cy="760" r="1.5" fill="#DCCFB8"/>
    <circle cx="835" cy="842" r="2" fill="#E8D5B7"/>
    <circle cx="165" cy="490" r="1.5" fill="#D4C5A9"/>
    <circle cx="885" cy="530" r="1.5" fill="#DCCFB8"/>
    <circle cx="310" cy="142" r="1" fill="#D4C5A9"/>
    <circle cx="738" cy="895" r="1" fill="#D4C5A9"/>
    <circle cx="450" cy="120" r="1" fill="#C8B898"/>
    <circle cx="590" cy="905" r="1" fill="#C8B898"/>
    <circle cx="920" cy="680" r="1" fill="#D4C5A9"/>
    <circle cx="780" cy="130" r="1" fill="#C8B898"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="512" cy="512" r="420" fill="url(#logoGlow)"/>

  <!-- Logo: K shape + voice streaks, centered and scaled -->
  <g transform="translate(512, 512) scale(0.58) translate(-750, -750)" filter="url(#softGlow)">

    <!-- Main K body (white) -->
    <path fill="#ffffff" d="M 150 903.460938 L 821.261719 423 L 1350 423 L 623.5625 813.804688 L 886.78125 1077.023438 L 685.632812 1077.023438 L 384.480469 903.460938 Z M 150 903.460938" fill-opacity="1"/>

    <!-- K triangle accent (white) -->
    <path fill="#ffffff" d="M 297.894531 726.605469 L 657.179688 469.445312 L 375.289062 469.445312 Z M 297.894531 726.605469" fill-opacity="1"/>

    <!-- Voice streak: horizontal bar (red) -->
    <g filter="url(#streakGlow)">
      <path fill="url(#streakGrad)" d="M 1138.078125 882.292969 C 1141.507812 882.277344 1145.039062 882.070312 1148.34375 881.253906 C 1158.804688 878.660156 1165.460938 869.660156 1165.136719 859.070312 C 1164.808594 848.300781 1156.929688 839.378906 1146.113281 837.75 C 1143.332031 837.328125 1140.480469 837.292969 1137.660156 837.296875 C 1084.902344 837.496094 1032.140625 837.710938 979.382812 838.003906 C 975.640625 838.027344 971.789062 838.183594 968.179688 839.078125 C 959.203125 841.308594 953.042969 848.757812 952.035156 857.851562 C 950.957031 867.507812 955.5625 876.015625 964.089844 881.28125 C 969.015625 881.855469 973.9375 882.929688 978.851562 882.917969 C 1031.925781 882.824219 1084.996094 882.574219 1138.074219 882.292969 Z M 1138.078125 882.292969" fill-opacity="1"/>

      <!-- Voice streak: upper diagonal (red) -->
      <path fill="url(#streakGrad)" d="M 952.136719 786.238281 C 995.855469 762.566406 1039.542969 738.839844 1083.214844 715.074219 C 1086.523438 713.273438 1089.90625 711.4375 1092.746094 709.019531 C 1104.785156 698.789062 1102.808594 679.699219 1088.996094 672.347656 C 1081.425781 668.316406 1073.785156 669.050781 1066.398438 673 C 1056.40625 678.339844 1046.464844 683.777344 1036.511719 689.175781 C 1000.839844 708.542969 965.179688 727.929688 929.492188 747.277344 C 923.890625 750.316406 918.527344 753.546875 916.605469 757.921875 C 911.65625 768.15625 912.414062 776.253906 918.191406 783.601562 C 924.03125 791.027344 931.957031 793.425781 940.972656 791.148438 C 944.863281 790.164062 948.570312 788.167969 952.144531 786.234375 Z M 952.136719 786.238281" fill-opacity="1"/>

      <!-- Voice streak: lower diagonal (red) -->
      <path fill="url(#streakGrad)" d="M 1099.683594 1033.386719 C 1106.058594 1023.832031 1103.6875 1011.421875 1093.867188 1003.121094 C 1092.433594 1001.90625 1090.902344 1000.800781 1089.335938 999.746094 C 1050.234375 973.453125 1011.121094 947.171875 972.011719 920.882812 C 958.429688 911.753906 944.816406 913.160156 937.15625 924.5625 C 930.253906 934.839844 932.9375 949.242188 946.015625 957.824219 C 975.433594 977.117188 1004.429688 997.050781 1033.601562 1016.722656 C 1045.316406 1024.628906 1057.042969 1032.519531 1067.1875 1039.355469 C 1080.632812 1046.359375 1092.84375 1043.640625 1099.683594 1033.386719 Z M 1099.683594 1033.386719" fill-opacity="1"/>
    </g>
  </g>
</svg>
