<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zana Orb</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: drag;
      cursor: grab;
    }
    body:active {
      cursor: grabbing;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
      position: relative;
      z-index: 1;
    }
    .status {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      text-align: center;
      pointer-events: none;
    }
    #drag-region {
      position: absolute;
      inset: 0;
      z-index: 2;
      -webkit-app-region: drag;
    }
    .status.recording { color: rgba(255,100,100,0.9); }
    .status.processing { color: rgba(100,200,255,0.9); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="drag-region" data-drag-region aria-hidden="true"></div>
  <div id="status" class="status"></div>

  <!-- Notifications system -->
  <script src="notifications.js"></script>
  <!-- Orb lifecycle framework (activates only for migrated renderers) -->
  <script src="orb-lifecycle.js"></script>
  <!-- Orb renderer loaded dynamically based on preference -->
  <script id="orb-script"></script>
  <script>
    // Map style names to script files
    const orbScripts = {
      'nebula': 'orb-nebula.js',
      'fire': 'orb-fire.js',
      'fire-v2': 'orb-fire-v2.js',
      'fire-v3': 'orb-fire-v3.js',
      'fire-v4': 'orb-fire-v4.js',
      'fire-v5': 'orb-fire-v5.js',
      'fire-v6': 'orb-fire-v6.js',
      'fire-v7': 'orb-fire-v7.js',
      'fire-v8': 'orb-fire-v8.js'
    };

    // Get orb style from localStorage (set by Rust via eval_js on macOS)
    const orbStyle = localStorage.getItem('Zana_orb_style') || 'fire-v8';

    // Load the selected orb script
    const scriptSrc = orbScripts[orbStyle] || orbScripts['fire-v8'];
    const scriptEl = document.getElementById('orb-script');

    // When renderer loads, check if it registered as a lifecycle renderer
    scriptEl.onload = function() {
      console.log('[Orb] Script loaded:', scriptSrc, '__orbRenderer:', !!window.__orbRenderer);
      if (window.__orbRenderer) {
        const canvas = document.getElementById('canvas');
        const opts = window.__orbRendererOptions || {};
        window.__lifecycle = new OrbLifecycle(canvas, window.__orbRenderer, opts);
        console.log('[Orb] Lifecycle renderer activated');
      } else {
        console.log('[Orb] Legacy renderer (no lifecycle)');
      }
    };

    scriptEl.src = scriptSrc;
    console.log('[Orb] Loaded style:', orbStyle, 'from', scriptSrc);

    // Windows/Linux: listen for Tauri events
    // (macOS uses eval_js to call window.* directly)
    if (window.__TAURI__) {
      import('@tauri-apps/api/event').then(({ listen }) => {
        listen('apply-orb-style', (event) => {
          console.log('[Orb] Style changed via Tauri:', event.payload);
          localStorage.setItem('Zana_orb_style', event.payload);
          location.reload();
        });

        listen('recording-state', (event) => {
          const { recording, processing } = event.payload;
          if (window.setRecordingState) {
            window.setRecordingState(recording, processing);
          }
        });

        listen('audio-level', (event) => {
          if (window.setAudioLevel) {
            window.setAudioLevel(event.payload);
          }
        });

        listen('transcription-complete', () => {
          if (window.setTranscriptionComplete) {
            window.setTranscriptionComplete();
          }
        });

        listen('orb-fade-in', () => {
          if (window.resetOrb) window.resetOrb();
          if (window.fadeIn) window.fadeIn();
        });

        listen('orb-fade-out', () => {
          if (window.fadeOut) window.fadeOut();
        });
      });
    }
  </script>
</body>
</html>
