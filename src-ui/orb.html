<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kVoice Orb</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      -webkit-user-select: none;
      user-select: none;
    }
    .status {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      text-align: center;
      pointer-events: none;
      -webkit-app-region: no-drag;
    }
    .status.recording { color: rgba(255,100,100,0.9); }
    .status.processing { color: rgba(100,200,255,0.9); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status" class="status"></div>

  <!-- Notifications system -->
  <script src="notifications.js"></script>
  <!-- Orb renderer loaded dynamically based on preference -->
  <script id="orb-script"></script>
  <script>
    // Map style names to script files
    const orbScripts = {
      'nebula': 'orb-nebula.js',
      'fire': 'orb-fire.js',
      'fire-v2': 'orb-fire-v2.js',
      'fire-v3': 'orb-fire-v3.js',
      'fire-v4': 'orb-fire-v4.js',
      'fire-v5': 'orb-fire-v5.js',
      'fire-v6': 'orb-fire-v6.js',
      'fire-v7': 'orb-fire-v7.js',
      'fire-v8': 'orb-fire-v8.js'
    };

    // Get orb style from localStorage (set by Rust via eval_js on macOS)
    const orbStyle = localStorage.getItem('kvoice_orb_style') || 'fire-v8';

    // Load the selected orb script
    const scriptSrc = orbScripts[orbStyle] || orbScripts['fire-v8'];
    const scriptEl = document.getElementById('orb-script');
    scriptEl.src = scriptSrc;

    console.log('[Orb] Loaded style:', orbStyle, 'from', scriptSrc);

    // Windows/Linux: listen for style changes via Tauri emit
    // (macOS uses eval_js to set localStorage + reload directly)
    if (window.__TAURI__) {
      import('@tauri-apps/api/event').then(({ listen }) => {
        listen('apply-orb-style', (event) => {
          console.log('[Orb] Style changed via Tauri:', event.payload);
          localStorage.setItem('kvoice_orb_style', event.payload);
          location.reload();
        });
      });
    }
  </script>
</body>
</html>
