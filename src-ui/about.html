<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About kVoice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .about-container {
      text-align: center;
      padding: 40px;
      max-width: 400px;
    }
    .logo {
      width: 128px;
      height: 128px;
      margin: 0 auto 24px;
      background: radial-gradient(circle at 30% 30%, #ff6b35, #ff4444, #cc0000);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(255, 107, 53, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
    }
    .version {
      font-size: 14px;
      color: #8888aa;
      margin-bottom: 24px;
    }
    .description {
      font-size: 15px;
      line-height: 1.6;
      color: #b0b0c0;
      margin-bottom: 32px;
    }
    .feature {
      display: inline-block;
      background: rgba(255, 107, 53, 0.1);
      border: 1px solid rgba(255, 107, 53, 0.3);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: #ff8866;
      margin: 4px;
    }
    .copyright {
      font-size: 12px;
      color: #666688;
      margin-top: 32px;
    }
    .close-btn {
      -webkit-app-region: no-drag;
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      color: #888;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }
  </style>
</head>
<body>
  <button class="close-btn" onclick="window.close()">&times;</button>

  <div class="about-container">
    <div class="logo">K</div>
    <h1>kVoice</h1>
    <div class="version">Version 1.0.0</div>

    <p class="description">
      Privacy-first speech-to-text with beautiful audio visualizations.
      Your voice never leaves your device.
    </p>

    <div class="features">
      <span class="feature">Local Whisper AI</span>
      <span class="feature">Privacy First</span>
      <span class="feature">Beautiful Orb</span>
      <span class="feature">Fn Key Trigger</span>
    </div>

    <p class="copyright">
      Copyright 2025 kVoice<br>
      Built with Tauri + Whisper.cpp
    </p>
  </div>
</body>
</html>
