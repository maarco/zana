<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Zana</title>
  <style>
    :root {
      --background: oklch(0.13 0 0);
      --foreground: oklch(0.97 0 0);
      --card: oklch(0.17 0 0);
      --muted: oklch(0.22 0 0);
      --muted-foreground: oklch(0.65 0 0);
      --primary: oklch(0.65 0.18 250);
      --border: oklch(1 0 0 / 8%);
      --radius: 6px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .about-container {
      text-align: center;
      padding: 32px;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .logo {
      width: 84px;
      height: 84px;
      margin: 0 auto 24px;
      background: var(--muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 42px;
      font-weight: 900;
    }
    h1 {
      font-size: 28px;
      font-weight: 900;
      color: var(--foreground);
      margin-bottom: 8px;
    }
    .version {
      font-size: 14px;
      color: var(--muted-foreground);
      margin-bottom: 24px;
    }
    .description {
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted-foreground);
      margin-bottom: 32px;
    }
    .feature {
      display: inline-block;
      background: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--foreground);
      margin: 4px;
    }
    .copyright {
      font-size: 12px;
      color: var(--muted-foreground);
      margin-top: 32px;
    }
    .close-btn {
      -webkit-app-region: no-drag;
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      border: 1px solid var(--border);
      background: var(--muted);
      border-radius: var(--radius);
      color: var(--muted-foreground);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .close-btn:hover {
      background: oklch(0.25 0 0);
      color: var(--foreground);
    }
  </style>
</head>
<body>
  <button class="close-btn" onclick="closeWindow()">&times;</button>

  <div class="about-container">
    <div class="logo">q</div>
    <h1>Zana</h1>
    <div class="version">Version 1.0.0</div>

    <p class="description">
      Privacy-first speech-to-text with beautiful audio visualizations.
      Your voice never leaves your device.
    </p>

    <div class="features">
      <span class="feature">Local Whisper AI</span>
      <span class="feature">Privacy First</span>
      <span class="feature">Beautiful Orb</span>
      <span class="feature">Fn Key Trigger</span>
    </div>

    <p class="copyright">
      Copyright 2025 Zana<br>
      Built with Tauri + Whisper.cpp
    </p>
  </div>
  <script>
    async function closeWindow() {
      try {
        if (window.__TAURI__ && window.__TAURI__.window
            && typeof window.__TAURI__.window.getCurrentWindow === 'function') {
          await window.__TAURI__.window.getCurrentWindow().close();
          return;
        }
        if (window.__TAURI__ && window.__TAURI__.webviewWindow
            && typeof window.__TAURI__.webviewWindow.getCurrent === 'function') {
          await window.__TAURI__.webviewWindow.getCurrent().close();
          return;
        }
      } catch (e) {
        console.error('Failed to close via Tauri window API:', e);
      }
      window.close();
    }
  </script>
</body>
</html>
