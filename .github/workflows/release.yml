name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release candidate
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check build
        run: cargo check -p Zana-app --locked

      - name: Run tests
        run: cargo test -p Zana-app --locked

      - name: Run clippy
        run: cargo clippy -p Zana-app --all-targets --all-features --locked -- -D warnings

  build-macos:
    name: Build macOS universal app
    needs: verify
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Apple Silicon app
        run: cargo tauri build --target aarch64-apple-darwin -- --locked

      - name: Build Intel app
        run: cargo tauri build --target x86_64-apple-darwin -- --locked

      - name: Import Developer ID certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          KEYCHAIN_PASSWORD_SECRET: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/qvoice-signing.keychain-db"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD_SECRET:-${GITHUB_RUN_ID}}"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Create universal app
        run: |
          ARM_APP="target/aarch64-apple-darwin/release/bundle/macos/qVoice.app"
          INTEL_APP="target/x86_64-apple-darwin/release/bundle/macos/qVoice.app"
          UNIVERSAL_APP="target/universal-apple-darwin/release/bundle/macos/qVoice.app"
          EXECUTABLE="Zana-app"

          test -d "$ARM_APP"
          test -d "$INTEL_APP"

          mkdir -p "$(dirname "$UNIVERSAL_APP")"
          cp -R "$ARM_APP" "$UNIVERSAL_APP"

          lipo -create \
            "$ARM_APP/Contents/MacOS/$EXECUTABLE" \
            "$INTEL_APP/Contents/MacOS/$EXECUTABLE" \
            -output "$UNIVERSAL_APP/Contents/MacOS/$EXECUTABLE"

          lipo -info "$UNIVERSAL_APP/Contents/MacOS/$EXECUTABLE"

      - name: Sign universal app
        if: ${{ env.APPLE_SIGNING_IDENTITY != '' }}
        run: |
          APP_PATH="target/universal-apple-darwin/release/bundle/macos/qVoice.app"
          ENTITLEMENTS="src-tauri/entitlements.plist"

          find "$APP_PATH/Contents/Frameworks" -type f -name "*.dylib" -exec \
            codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements "$ENTITLEMENTS" {} \; 2>/dev/null || true

          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements "$ENTITLEMENTS" \
            "$APP_PATH/Contents/MacOS/Zana-app"

          codesign --force --deep --options runtime --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements "$ENTITLEMENTS" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Create DMG
        run: |
          UNIVERSAL_APP="target/universal-apple-darwin/release/bundle/macos/qVoice.app"
          DMG_PATH="qVoice-${{ github.ref_name }}-universal.dmg"
          TEMP_DMG="/tmp/qVoice-temp.dmg"

          rm -f "$DMG_PATH" "$TEMP_DMG"

          hdiutil create -srcfolder "$UNIVERSAL_APP" -volname "qVoice" -fs HFS+ \
            -fsargs "-c c=64,a=16,e=16" -format UDRW "$TEMP_DMG"
          hdiutil convert "$TEMP_DMG" -format UDZO -imagekey zlib-level=9 -o "$DMG_PATH"
          rm -f "$TEMP_DMG"

      - name: Sign and notarize DMG
        if: ${{ env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          DMG_PATH="qVoice-${{ github.ref_name }}-universal.dmg"

          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: qVoice-macos-universal
          path: qVoice-*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    needs: verify
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Windows installer
        run: cargo tauri build -- --locked

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: qVoice-windows-nsis
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

  create-release:
    name: Create GitHub release
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: qVoice-macos-universal

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: qVoice-windows-nsis

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            qVoice-*.dmg
            *.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
