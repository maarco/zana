name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release candidate
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check build
        run: cargo check -p Zana-app --locked

      - name: Run tests
        run: cargo test -p Zana-app --locked

      - name: Run clippy
        run: cargo clippy -p Zana-app --all-targets --all-features --locked -- -D warnings

  build-macos:
    name: Build macOS universal app
    needs: verify
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Apple Silicon app
        run: cargo tauri build --target aarch64-apple-darwin -- --locked

      - name: Build Intel app
        run: cargo tauri build --target x86_64-apple-darwin -- --locked

      - name: Create universal app
        run: |
          ARM_APP="target/aarch64-apple-darwin/release/bundle/macos/Zana.app"
          INTEL_APP="target/x86_64-apple-darwin/release/bundle/macos/Zana.app"
          UNIVERSAL_APP="target/universal-apple-darwin/release/bundle/macos/Zana.app"

          test -d "$ARM_APP"
          test -d "$INTEL_APP"

          mkdir -p "$(dirname "$UNIVERSAL_APP")"
          cp -R "$ARM_APP" "$UNIVERSAL_APP"

          lipo -create \
            "$ARM_APP/Contents/MacOS/Zana" \
            "$INTEL_APP/Contents/MacOS/Zana" \
            -output "$UNIVERSAL_APP/Contents/MacOS/Zana"

          lipo -info "$UNIVERSAL_APP/Contents/MacOS/Zana"

      - name: Create DMG
        run: |
          UNIVERSAL_APP="target/universal-apple-darwin/release/bundle/macos/Zana.app"
          DMG_PATH="Zana-${{ github.ref_name }}-universal.dmg"
          TEMP_DMG="/tmp/Zana-temp.dmg"

          rm -f "$DMG_PATH" "$TEMP_DMG"

          hdiutil create -srcfolder "$UNIVERSAL_APP" -volname "Zana" -fs HFS+ \
            -fsargs "-c c=64,a=16,e=16" -format UDRW "$TEMP_DMG"
          hdiutil convert "$TEMP_DMG" -format UDZO -imagekey zlib-level=9 -o "$DMG_PATH"
          rm -f "$TEMP_DMG"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zana-macos-universal
          path: Zana-*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    needs: verify
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Windows installer
        run: cargo tauri build -- --locked

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zana-windows-nsis
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

  create-release:
    name: Create GitHub release
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Zana-macos-universal

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Zana-windows-nsis

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Zana-*.dmg
            *.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
