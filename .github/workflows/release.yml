name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build for Apple Silicon
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Build for Intel
        run: cargo tauri build --target x86_64-apple-darwin

      - name: Create Universal Binary
        run: |
          ARM_APP="target/aarch64-apple-darwin/release/bundle/macos/Zana.app"
          INTEL_APP="target/x86_64-apple-darwin/release/bundle/macos/Zana.app"
          UNIVERSAL_APP="target/universal-apple-darwin/release/bundle/macos/Zana.app"

          mkdir -p "$(dirname "$UNIVERSAL_APP")"
          cp -R "$ARM_APP" "$UNIVERSAL_APP"

          lipo -create \
            "$ARM_APP/Contents/MacOS/Zana" \
            "$INTEL_APP/Contents/MacOS/Zana" \
            -output "$UNIVERSAL_APP/Contents/MacOS/Zana"

      - name: Create DMG
        run: |
          UNIVERSAL_APP="target/universal-apple-darwin/release/bundle/macos/Zana.app"
          hdiutil create -srcfolder "$UNIVERSAL_APP" -volname "Zana" -fs HFS+ \
            -fsargs "-c c=64,a=16,e=16" -format UDRW /tmp/Zana-temp.dmg
          hdiutil convert /tmp/Zana-temp.dmg -format UDZO -imagekey zlib-level=9 \
            -o Zana-${{ github.ref_name }}-universal.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Zana-macos-universal
          path: Zana-*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Windows installer
        run: cargo tauri build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Zana-windows-nsis
          path: target/release/bundle/nsis/*.exe

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: Zana-macos-universal

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: Zana-windows-nsis

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Zana-*.dmg
            *.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
